student_model_path: post_train/outputs/sft/full/final
teacher_model_path: post_train/model/qwen/qwen3-8b
train_data: post_train/data/grpo/grpo_train_4k.jsonl
val_data: post_train/data/processed/val_200.jsonl
output_dir: post_train/outputs/opd/gkd
response_field: response

# TRL experimental GKD setup:
# - lmbda: 1.0 makes every batch on-policy: the student generates completions.
# - beta: 0.0 uses the forward-KL side of generalized JSD.
# - seq_kd: false avoids teacher sequence generation; teacher scores student rollouts.
lmbda: 1.0
beta: 0.0
seq_kd: false
temperature: 0.9
# Lowered from 1024 -> 512: countdown answers are short (most < 500 tokens),
# and on-policy student generation (HF generate, no vllm) is the speed
# bottleneck at ~10s/1024tok. 512 ~halves generation time.
max_new_tokens: 512
# Cap the full sequence (prompt+completion). prompt(~74) + 512 completion,
# 640 keeps the full completion trainable without truncating the tail.
max_seq_len: 640

learning_rate: 5e-6
weight_decay: 0.0
warmup_ratio: 0.03
scheduler: cosine
# 4k data / (batch 1 * grad_accum 16) = 250 steps/epoch. Lowered max_steps
# 500 -> 200 (on-policy GKD generation is slow; 200 steps = 3200 samples is
# enough to gauge distillation trend). epochs:1 caps at 250, so max_steps=200
# runs in ~1 epoch.
epochs: 1
max_steps: 200
# Batched on-policy generation is more efficient than batch=1 x many accum
# steps. per_device_train_batch_size=2; grad_accum 8 -> 4 to roughly halve
# per-step time (4 microbatches vs 8). Effective batch drops 16 -> 8 (2x4),
# so max_steps=200 sees 1600 samples (~0.4 epoch). Gradients are noisier;
# consider lr 5e-6 -> 2.5e-6 if unstable. Watch VRAM; revert if OOM.
per_device_train_batch_size: 2
gradient_accumulation_steps: 4

bf16: true
gradient_checkpointing: true
teacher_dtype: bfloat16
teacher_attn_implementation: flash_attention_2
trust_remote_code: true

eval_every_steps: 250
save_every_steps: 500
logging_steps: 10
report_to: null
wandb_project: countdown-post-train
wandb_entity: null
wandb_group: null
wandb_tags:
  - opd
  - gkd
run_name: opd_gkd
run_name_auto_suffix: true
