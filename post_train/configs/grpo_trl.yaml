model_path: post_train/outputs/sft/full/final
train_data: post_train/data/grpo/grpo_train_4k.jsonl
val_data: post_train/data/processed/val_200.jsonl
output_dir: post_train/outputs/grpo_trl

max_prompt_len: 256
max_new_tokens: 1024
batch_size: 4
gradient_accumulation_steps: 1
group_size: 5
generation_batch_size: 20

learning_rate: 5e-6
weight_decay: 0.0
warmup_ratio: 0.03
scheduler: cosine
max_steps: 500

# In this TRL entrypoint, clip_eps maps to TRL GRPOConfig.epsilon, i.e. the
# standard policy-ratio clipping parameter. The legacy train_grpo.py keeps its
# original behavior, where clip_eps clips normalized advantages.
clip_eps: 0.2
kl_coeff: 0.0

format_reward: 0.5
answer_reward: 1.0
length_penalty_start: 800
length_penalty_max: -0.5

temperature: 1.2
top_p: 0.95
use_vllm: true
vllm_mode: colocate
rollout_gpu_memory_utilization: 0.35
rollout_max_model_len: 1024
tensor_parallel_size: 1

bf16: true
gradient_checkpointing: true
enable_thinking: false

eval_every_steps: 250
save_every_steps: 500
logging_steps: 10
report_to: null
wandb_project: countdown-post-train
wandb_entity: null
wandb_group: null
wandb_tags:
  - grpo
  - trl
run_name: grpo_trl
run_name_auto_suffix: true
