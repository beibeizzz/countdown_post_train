base_model_path: post_train/model/qwen/qwen3-8b
train_prompts: post_train/data/sft/sft_train_8k.jsonl
accepted_output: post_train/data/sft/rft_accepted.jsonl
output_dir: post_train/outputs/sft/rft
num_samples_per_prompt: 4
batch_size: 32
max_new_tokens: 256
temperature: 0.7
top_p: 0.95
enable_thinking: false
train:
  max_seq_len: 256
  learning_rate: 1.0e-5
  warmup_ratio: 0.03
  scheduler: cosine
  epochs: 2
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  bf16: true
  gradient_checkpointing: true
  report_to: null
  wandb_project: countdown-post-train
  wandb_entity: null
  wandb_group: null
  wandb_tags:
    - sft
    - rft
  run_name: rft
  run_name_auto_suffix: true
  logging_steps: 10
